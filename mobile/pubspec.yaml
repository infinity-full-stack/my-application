name: master_scan
description: "Master Scan - AI Auto Parts Marketplace"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # HTTP & API
  dio: ^5.4.3
  retrofit: ^4.1.0

  # Local storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # Navigation
  go_router: ^13.2.0

  # Camera & Image
  image_picker: ^1.1.2
  camera: ^0.11.0+2

  # Maps
  google_maps_flutter: ^2.6.1
  geolocator: ^12.0.0

  # UI
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  flutter_svg: ^2.0.10+1

  # Utils
  intl: ^0.19.0
  equatable: ^2.0.5
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  freezed: ^2.5.2
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
